# Snippet ingress per il cloudflared già installato sulla devbox.
# Da MERGIARE nel `config.yml` di cloudflared (di solito
# /etc/cloudflared/config.yml), NON usare come file standalone.
#
# Dopo la modifica del config:
#   sudo systemctl restart cloudflared
#   sudo cloudflared tunnel route dns <TUNNEL_NAME> mcpdev.robertonovara.me
#   (la riga `route dns` solo la prima volta, per registrare il CNAME.)

ingress:
  - hostname: mcpdev.robertonovara.me
    service: http://127.0.0.1:8765
  - service: http_status:404
